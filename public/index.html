<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashfree Checkout</title>
    <!-- 1. Include SDK -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f9fafb; }
        .payment-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; }
        h1 { margin-top: 0; color: #111827; }
        p { color: #6b7280; margin-bottom: 30px; }
        .pay-button { background-color: #4f46e5; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.2s; width: 100%; }
        .pay-button:hover { background-color: #4338ca; }
        .pay-button:disabled { background-color: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h1>Checkout</h1>
        <p>Testing ₹1.00 payment with Cashfree v2025-01-01</p>
        <button id="renderBtn" class="pay-button">Pay Now</button>
    </div>

    <script>
        // 2. Initialize SDK
        const cashfree = Cashfree({
            mode: "production" // Mode is production as per your keys
        });

        document.getElementById("renderBtn").addEventListener("click", async () => {
            const btn = document.getElementById("renderBtn");
            btn.disabled = true;
            btn.innerText = "Initializing...";

            try {
                // 3. Create Order on Server
                const response = await fetch("/api/create-order", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });
                
                const order = await response.json();
                console.log("Order Response from our Server:", order);

                const sessionId = order.payment_session_id || (order.raw && order.raw.payment_session_id);

                if (sessionId) {
                    console.log("Triggering checkout with session:", sessionId);
                    cashfree.checkout({
                        paymentSessionId: sessionId,
                        redirectTarget: "_self" 
                    });
                } else {
                    console.error("Missing payment_session_id. Full response:", order);
                    alert("Error: payment_session_id not found in response. Check console.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred. Check console.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Pay Now";
            }
        });
    </script>
</body>
</html>
